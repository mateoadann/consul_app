name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__,migrations

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: consul
          POSTGRES_PASSWORD: consul
          POSTGRES_DB: consul_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create PostgreSQL extensions
        env:
          PGPASSWORD: consul
        run: |
          psql -h localhost -U consul -d consul_app_test -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"
          psql -h localhost -U consul -d consul_app_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://consul:consul@localhost:5432/consul_app_test
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key
        run: pytest -vv -rA --tb=short
