{% extends 'base.html' %}
{% block title %}Resetear contrasena - Admin{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header-row">
    <h1>Resetear contrasena</h1>
    <a class="btn btn-ghost" href="{{ url_for('admin.editar_usuario', user_id=user.id) }}">Volver</a>
  </div>

  <p>Usuario: <strong>{{ user.username }}</strong> ({{ user.nombre }})</p>

  <form method="post" class="stack">
    {{ form.hidden_tag() }}

    <label>
      {{ form.password.label }}
      {{ form.password(class_='input', autocomplete='new-password') }}
      {% for error in form.password.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>

    {{ form.submit(class_='btn btn-primary btn-lg') }}
  </form>
</section>
{% endblock %}
