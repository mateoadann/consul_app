{% extends 'base.html' %}
{% block title %}Ingresar - ConsulApp{% endblock %}
{% block content %}
<section class="card card-auth">
  <h1>Ingresar</h1>
  <form method="post" class="stack">
    {{ form.hidden_tag() }}

    <label>
      {{ form.username.label }}
      {{ form.username(class_='input', autocomplete='username') }}
      {% for error in form.username.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>

    <label>
      {{ form.password.label }}
      {{ form.password(class_='input', autocomplete='current-password') }}
      {% for error in form.password.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>

    {{ form.submit(class_='btn btn-primary') }}
  </form>
</section>
{% endblock %}
