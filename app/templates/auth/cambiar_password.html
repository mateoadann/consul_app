{% extends 'base.html' %}
{% block title %}Cambiar contrasena - ConsulApp{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header-row">
    <h1>Cambiar contrasena</h1>
    <a class="btn btn-ghost" href="{{ url_for('agenda.index') }}">Volver</a>
  </div>

  <form method="post" class="stack">
    {{ form.hidden_tag() }}

    <label>
      {{ form.current.label }}
      {{ form.current(class_='input', autocomplete='current-password') }}
      {% for error in form.current.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>

    <label>
      {{ form.new_password.label }}
      {{ form.new_password(class_='input', autocomplete='new-password') }}
      {% for error in form.new_password.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>

    {{ form.submit(class_='btn btn-primary btn-lg') }}
  </form>
</section>
{% endblock %}
