{% extends 'base.html' %}
{% block title %}{{ 'Editar' if profesional else 'Nuevo' }} Profesional - ConsulApp{% endblock %}
{% block content %}
<section class="card">
  <div class="card-header-row">
    <h1>{{ 'Editar' if profesional else 'Nuevo' }} profesional</h1>
    <div class="card-header-actions">
      <a
        class="btn btn-ghost"
        href="{{ url_for('profesionales.detalle', profesional_id=profesional.id) if profesional else url_for('profesionales.lista') }}"
      >Volver</a>
    </div>
  </div>

  <form method="post" class="stack">
    {{ form.hidden_tag() }}
    <label>
      {{ form.nombre.label }}
      {{ form.nombre(class_='input') }}
      {% for error in form.nombre.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
      {{ form.apellido.label }}
      {{ form.apellido(class_='input') }}
      {% for error in form.apellido.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
      {{ form.especialidad.label }}
      {{ form.especialidad(class_='input') }}
      {% for error in form.especialidad.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
      {{ form.telefono.label }}
      {{ form.telefono(class_='input') }}
      {% for error in form.telefono.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
      {{ form.email.label }}
      {{ form.email(class_='input') }}
      {% for error in form.email.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    </label>
    <label class="switch-inline">{{ form.activo() }} Activo</label>
    {{ form.submit(class_='btn btn-primary btn-lg') }}
  </form>
</section>
{% endblock %}
